<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="סופש" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="description" content="הצעות מותאמות אישית לבילויים, טיולים, אירועים וחוויות — כל שבוע מחדש" />
    <title>סופש — מה עושים בסוף השבוע?</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #f9fafb; overscroll-behavior: none; }
      input, select, textarea, button { font-family: inherit; }
      ::-webkit-scrollbar { display: none; }
      html { scroll-behavior: smooth; scrollbar-width: none; }

      /* Splash Screen */
      #splash { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%); color: #fff; transition: opacity 0.5s; }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash .logo { font-size: 64px; margin-bottom: 12px; animation: bounce 1s ease-in-out; }
      #splash .title { font-size: 36px; font-weight: 800; }
      #splash .subtitle { font-size: 16px; opacity: 0.8; margin-top: 6px; }
      #splash .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 32px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">🌅</div>
      <div class="title">סופש</div>
      <div class="subtitle">מה עושים בסוף השבוע?</div>
      <div class="loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('splash').classList.add('hidden');
          setTimeout(() => document.getElementById('splash').remove(), 500);
        }, 1500);
      });
    </script>
  </body>
</html>
